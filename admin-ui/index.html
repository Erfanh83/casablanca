<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<base href="/"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>پنل مدیریت | کازابلانکا</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="dns-prefetch" href="https://unpkg.com"/>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/css/admin.css"/>
</head>
<body>
<div id="app" v-cloak>

  <!-- ════ LOGIN ════ -->
  <div class="login-wrap" v-if="!token">
    <div class="login-card">
      <div class="login-logo">
        <img src="/assets/images/logo.png" alt="Casablanca"
             @error="e=>e.target.style.display='none'"/>
        <div class="login-logo-text">CASABLANCA</div>
        <div class="login-logo-sub">Admin Panel</div>
      </div>
      <div class="f-group">
        <label class="f-label">نام کاربری</label>
        <input class="f-input" v-model="lf.username" placeholder="username"
               @keyup.enter="doLogin" :disabled="lLoading" autocomplete="username"/>
      </div>
      <div class="f-group">
        <label class="f-label">رمز عبور</label>
        <input class="f-input" type="password" v-model="lf.password" placeholder="••••••••"
               @keyup.enter="doLogin" :disabled="lLoading" autocomplete="current-password"/>
      </div>
      <div class="login-err" v-if="lErr">{{ lErr }}</div>
      <button type="button" class="btn-login" @click="doLogin" :disabled="lLoading">
        <span class="btn-login-spinner" v-if="lLoading"></span>
        {{ lLoading ? 'در حال ورود...' : 'ورود به پنل' }}
      </button>
    </div>
  </div>

  <!-- ════ MAIN APP ════ -->
  <template v-else>
    <!-- mobile overlay -->
    <div class="sb-overlay" :class="{open:sbOpen}" @click="sbOpen=false"></div>

    <!-- mobile header -->
    <div class="mob-header">
      <span class="mob-logo">CASABLANCA</span>
      <button class="mob-burger" :class="{open:sbOpen}" @click="sbOpen=!sbOpen">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- SHELL: flex wrapper for sidebar + main -->
    <div id="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" :class="{open:sbOpen}">
      <div class="sb-head">
        <div class="sb-logo">
          <img src="/assets/images/logo.png" style="height:36px;border-radius:6px"
               @error="e=>e.target.style.display='none'"/>
          <div class="sb-logo-t"><b>CASABLANCA</b><span>Admin Panel</span></div>
        </div>
        <div class="sb-user" v-if="me.username">
          <div class="sb-avatar">{{ (me.first_name||me.username||'م')[0] }}</div>
          <div>
            <div class="sb-uname">{{ me.first_name||me.username }}</div>
            <div class="sb-urole">مدیر سیستم</div>
          </div>
        </div>
      </div>
      <nav class="sb-nav">
        <div class="sb-sec">داشبورد</div>
        <div class="sb-item" :class="{active:pg==='dash'}" @click="nav('dash')">
          <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
          داشبورد
        </div>
        <div class="sb-sec">منو</div>
        <div class="sb-item" :class="{active:pg==='cafe'}" @click="nav('cafe')">
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 4h10v6a4 4 0 01-4 4H7a4 4 0 01-4-4V4z" stroke="currentColor" stroke-width="1.3"/><path d="M13 6h1a1 1 0 011 1v1a2 2 0 01-2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          منوی کافه
        </div>
        <div class="sb-item" :class="{active:pg==='rest'}" @click="nav('rest')">
          <svg viewBox="0 0 16 16" fill="none"><path d="M5 1v5.5a2.5 2.5 0 005 0V1M7.5 7v8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M12 1v14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          منوی رستوران
        </div>
        <div class="sb-sec">دسته‌بندی‌ها</div>
        <div class="sb-item" :class="{active:pg==='cats'}" @click="nav('cats')">
          <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          مدیریت دسته‌بندی‌ها
        </div>
      </nav>
      <div class="sb-foot">
        <button class="btn-logout" @click="doLogout">خروج از حساب</button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <span class="topbar-title">{{ pgTitle }}</span>
        <div class="topbar-actions">
          <button class="btn-primary" v-if="pg==='cafe'||pg==='rest'" @click="openAddItem">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            افزودن آیتم
          </button>
          <button class="btn-primary" v-if="pg==='cats'" @click="openAddCat">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            افزودن دسته‌بندی
          </button>
        </div>
      </div>

      <div class="page-body">

        <!-- DASHBOARD -->
        <template v-if="pg==='dash'">
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-lbl">آیتم‌های کافه</div><div class="stat-val">{{ stats.cafe }}</div><div class="stat-sub">آیتم فعال</div></div>
            <div class="stat-card"><div class="stat-lbl">آیتم‌های رستوران</div><div class="stat-val">{{ stats.rest }}</div><div class="stat-sub">آیتم فعال</div></div>
            <div class="stat-card"><div class="stat-lbl">دسته‌بندی‌ها</div><div class="stat-val">{{ stats.cats }}</div><div class="stat-sub">کل دسته‌بندی</div></div>
            <div class="stat-card"><div class="stat-lbl">آیتم‌های مخفی</div><div class="stat-val">{{ stats.hidden }}</div><div class="stat-sub">غیرفعال</div></div>
          </div>
          <div class="table-card">
            <div class="table-head"><span class="table-title">آخرین آیتم‌ها</span></div>
            <div class="empty" v-if="loading"><div class="tbl-spinner"></div><p>در حال بارگذاری...</p></div>
            <div class="tbl-wrap" v-else>
              <table>
                <thead><tr><th>تصویر</th><th>نام</th><th>دسته</th><th>قیمت</th><th>وضعیت</th></tr></thead>
                <tbody>
                  <tr v-for="item in recentItems.slice(0,10)" :key="item.id">
                    <td><img class="td-img" :src="item.image_url||'https://picsum.photos/seed/'+item.id+'/46/46'" :alt="item.name_fa" @error="e=>{e.target.onerror=null;e.target.src='https://picsum.photos/seed/'+item.id+'b/46/46'}"/></td>
                    <td class="td-name">{{ item.name_fa }}</td>
                    <td><span class="pill pill-gold">{{ item.menu_type==='cafe'?'کافه':'رستوران' }}</span></td>
                    <td class="td-price">{{ fmtPrice(item.price) }}</td>
                    <td><span class="pill" :class="item.is_visible?'pill-teal':'pill-red'">{{ item.is_visible?'فعال':'مخفی' }}</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>

        <!-- CAFE / REST MENU -->
        <template v-if="pg==='cafe'||pg==='rest'">
          <!-- mobile add btn -->
          <div style="margin-bottom:14px;display:flex;justify-content:flex-end">
            <button class="btn-primary" @click="openAddItem" style="display:none" id="mob-add-btn">+ افزودن آیتم</button>
          </div>
          <div class="tabs">
            <div class="tab" v-for="cat in pageCats" :key="cat.id"
                 :class="{active:activeCat===cat.id}" @click="activeCat=cat.id">
              {{ cat.name_fa }}
            </div>
          </div>
          <div class="table-card">
            <div class="table-head">
              <span class="table-title">
                {{ pageCats.find(c=>c.id===activeCat)?.name_fa||'همه' }}
                <span style="color:var(--wd);font-size:12px;margin-right:6px">({{ filteredItems.length }} آیتم)</span>
              </span>
              <input class="search-inp" v-model="srch" placeholder="جستجو..."/>
            </div>
            <div class="empty" v-if="loading"><div class="tbl-spinner"></div><p>در حال بارگذاری...</p></div>
            <div class="tbl-wrap" v-else>
              <table>
                <thead><tr><th>تصویر</th><th>نام فارسی</th><th>نام انگلیسی</th><th>قیمت</th><th>وضعیت</th><th>عملیات</th></tr></thead>
                <tbody>
                  <tr v-for="item in filteredItems" :key="item.id">
                    <td><img class="td-img" :src="item.image_url||'https://picsum.photos/seed/'+item.id+'-cb/46/46'" :alt="item.name_fa" @error="e=>e.target.src='https://picsum.photos/seed/'+item.id+'a/46/46'"/></td>
                    <td class="td-name">{{ item.name_fa }}</td>
                    <td class="td-en">{{ item.name_en||'—' }}</td>
                    <td class="td-price">{{ fmtPrice(item.price) }}</td>
                    <td>
                      <label class="tgl" :title="item.is_visible?'مخفی کردن':'نمایش دادن'">
                        <input type="checkbox" :checked="item.is_visible" @change="toggleItem(item)"/>
                        <div class="tgl-track"></div>
                        <div class="tgl-thumb"></div>
                      </label>
                    </td>
                    <td>
                      <div class="row-acts">
                        <button class="act-btn" @click="openEditItem(item)" title="ویرایش">
                          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8.5 1.5L11.5 4.5 4.5 11.5H1.5V8.5L8.5 1.5z" stroke="currentColor" stroke-width="1.2"/></svg>
                        </button>
                        <button class="act-btn del" @click="deleteItem(item)" title="حذف">
                          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 3h9M5 3V2h3v1M4.5 5.5v5M8.5 5.5v5M2.5 3l.6 7.5h6.8L10.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                        </button>
                      </div>
                    </td>
                  </tr>
                  <tr v-if="!filteredItems.length"><td colspan="6" style="text-align:center;padding:40px;color:var(--wd)">آیتمی یافت نشد</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>

        <!-- CATEGORIES -->
        <template v-if="pg==='cats'">
          <div class="tabs">
            <div class="tab" :class="{active:catF==='all'}" @click="catF='all'">همه</div>
            <div class="tab" :class="{active:catF==='cafe'}" @click="catF='cafe'">کافه</div>
            <div class="tab" :class="{active:catF==='restaurant'}" @click="catF='restaurant'">رستوران</div>
          </div>
          <div class="table-card">
            <div class="table-head"><span class="table-title">دسته‌بندی‌ها</span></div>
            <div class="tbl-wrap">
              <table>
                <thead><tr><th>نام فارسی</th><th>نام انگلیسی</th><th>نوع</th><th>تعداد آیتم</th><th>وضعیت</th><th>عملیات</th></tr></thead>
                <tbody>
                  <tr v-for="cat in filteredCats" :key="cat.id">
                    <td class="td-name">{{ cat.name_fa }}</td>
                    <td class="td-en">{{ cat.name_en||'—' }}</td>
                    <td><span class="pill pill-gold">{{ cat.menu_type==='cafe'?'کافه':'رستوران' }}</span></td>
                    <td>{{ cat.items_count||0 }}</td>
                    <td><span class="pill" :class="cat.is_visible?'pill-teal':'pill-red'">{{ cat.is_visible?'فعال':'مخفی' }}</span></td>
                    <td>
                      <div class="row-acts">
                        <button class="act-btn" @click="openEditCat(cat)">
                          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8.5 1.5L11.5 4.5 4.5 11.5H1.5V8.5L8.5 1.5z" stroke="currentColor" stroke-width="1.2"/></svg>
                        </button>
                        <button class="act-btn del" @click="deleteCat(cat)">
                          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 3h9M5 3V2h3v1M4.5 5.5v5M8.5 5.5v5M2.5 3l.6 7.5h6.8L10.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>

      </div>
    </div><!-- /main -->
    </div><!-- /app-shell -->

    <!-- ════ ITEM MODAL ════ -->
    <div class="modal-bg" v-if="showItemModal" @click.self="showItemModal=false">
      <div class="modal-box">
        <div class="modal-title">{{ iForm.id?'ویرایش آیتم':'افزودن آیتم جدید' }}</div>
        <div class="m-grid">

          <!-- IMAGE UPLOAD -->
          <div class="m-full">
            <label class="m-label">تصویر آیتم</label>
            <div class="img-zone" :class="{'drag-over':dragOver}"
                 @click="$refs.fileInp.click()"
                 @dragover.prevent="dragOver=true"
                 @dragleave="dragOver=false"
                 @drop.prevent="onDrop">
              <div class="img-zone-placeholder" v-if="!iForm.previewUrl">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect x="3" y="3" width="30" height="30" rx="6" stroke="currentColor" stroke-width="1.5"/><circle cx="13" cy="13" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 24l8-8 6 6 4-4 12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <p>عکس را اینجا بکشید یا کلیک کنید</p>
                <span>JPG، PNG، WebP — حداکثر ۵ مگابایت</span>
              </div>
              <div class="img-preview-wrap" v-else @click.stop>
                <img class="img-preview" :src="iForm.previewUrl" alt="preview"/>
                <button class="img-preview-del" @click.stop="clearImg" title="حذف عکس">✕</button>
              </div>
              <div class="img-uploading" v-if="imgUploading">
                <div class="img-spinner"></div>
                <span>در حال آپلود...</span>
              </div>
            </div>
            <input type="file" ref="fileInp" accept="image/jpeg,image/png,image/webp" style="display:none" @change="onFileChange"/>
          </div>

          <div>
            <label class="m-label">نام فارسی *</label>
            <input class="m-input" v-model="iForm.name_fa" placeholder="مثلاً: اپرا"/>
          </div>
          <div>
            <label class="m-label">نام انگلیسی</label>
            <input class="m-input" v-model="iForm.name_en" placeholder="Opera" style="direction:ltr"/>
          </div>
          <div>
            <label class="m-label">قیمت (هزار تومان) *</label>
            <input class="m-input" type="number" v-model="iForm.price" placeholder="280" min="0"/>
          </div>
          <div>
            <label class="m-label">دسته‌بندی *</label>
            <select class="m-select" v-model="iForm.category">
              <option v-for="cat in allCats.filter(c=>c.menu_type===(pg==='cafe'?'cafe':'restaurant'))" :key="cat.id" :value="cat.id">{{ cat.name_fa }}</option>
            </select>
          </div>
          <div class="m-full">
            <label class="m-label">توضیحات</label>
            <textarea class="m-textarea" v-model="iForm.description" placeholder="توضیح کوتاه آیتم..."></textarea>
          </div>
          <div class="m-full m-checks">
            <label class="chk-lbl"><input type="checkbox" v-model="iForm.is_visible"/> نمایش داده شود</label>
            <label class="chk-lbl"><input type="checkbox" v-model="iForm.is_new"/> جدید</label>
            <label class="chk-lbl"><input type="checkbox" v-model="iForm.is_special"/> ویژه</label>
          </div>
        </div>
        <div class="modal-acts">
          <button class="btn-primary" @click="saveItem" :disabled="saving">{{ saving?'در حال ذخیره...':'ذخیره' }}</button>
          <button class="btn-secondary" @click="showItemModal=false">انصراف</button>
        </div>
      </div>
    </div>

    <!-- ════ CATEGORY MODAL ════ -->
    <div class="modal-bg" v-if="showCatModal" @click.self="showCatModal=false">
      <div class="modal-box">
        <div class="modal-title">{{ cForm.id?'ویرایش دسته‌بندی':'افزودن دسته‌بندی' }}</div>
        <div class="m-grid">
          <div>
            <label class="m-label">نام فارسی *</label>
            <input class="m-input" v-model="cForm.name_fa"/>
          </div>
          <div>
            <label class="m-label">نام انگلیسی</label>
            <input class="m-input" v-model="cForm.name_en" style="direction:ltr"/>
          </div>
          <div>
            <label class="m-label">نوع منو *</label>
            <select class="m-select" v-model="cForm.menu_type">
              <option value="cafe">کافه</option>
              <option value="restaurant">رستوران</option>
            </select>
          </div>
          <div>
            <label class="m-label">ترتیب</label>
            <input class="m-input" type="number" v-model="cForm.order" min="0"/>
          </div>
          <div class="m-full m-checks">
            <label class="chk-lbl"><input type="checkbox" v-model="cForm.is_visible"/> نمایش داده شود</label>
          </div>
        </div>
        <div class="modal-acts">
          <button class="btn-primary" @click="saveCat" :disabled="saving">{{ saving?'در حال ذخیره...':'ذخیره' }}</button>
          <button class="btn-secondary" @click="showCatModal=false">انصراف</button>
        </div>
      </div>
    </div>

  </template><!-- /main template -->

  <!-- NOTIFICATION -->
  <div class="notif" :class="notif.type==='ok'?'ok':'err'" v-if="notif.show">
    <span class="notif-dot"></span>{{ notif.msg }}
  </div>

</div><!-- /app -->

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="/assets/js/admin.js"></script>
</body>
</html>
